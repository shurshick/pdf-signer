name: Release RPM

on:
  workflow_dispatch:
    inputs:
      version:
        description: RPM version
        required: true
        default: 0.1.4
      release:
        description: RPM release
        required: true
        default: "1"

permissions:
  contents: write

jobs:
  rpm:
    runs-on: ubuntu-latest
    env:
      CGO_ENABLED: "1"
      GOOS: linux
      GOARCH: amd64
      APP_NAME: pdfsigner
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc libgl1-mesa-dev rpm xorg-dev

      - name: Build RPM
        env:
          VERSION: ${{ inputs.version }}
          RELEASE: ${{ inputs.release }}
        run: |
          printf "%s\n%s\nAutomated release build\n\n" "${VERSION}" "${RELEASE}" | bash build-rpm.sh

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ inputs.version }}
          name: pdfsigner ${{ inputs.version }} for RPM-based Linux
          files: dist/*.rpm
          fail_on_unmatched_files: true
          generate_release_notes: true
